controller_manager:
  ros__parameters:
    executor_type: single_threaded
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_wheel_drive_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

omni_wheel_drive_controller:
  ros__parameters:
    # ホイールのジョイント名（反時計回り順に記述）
    wheel_names:
      - wheel0_motor_shaft_joint
      - wheel1_motor_shaft_joint
      - wheel2_motor_shaft_joint
      - wheel3_motor_shaft_joint
    robot_radius: 0.5 #0.0855      # ロボット中心からホイールまでの距離
    wheel_radius: 0.05 #0.02      # ホイールの半径
    wheel_offset: 0.0       # 最初のホイールのX軸からの角度オフセット(rad)
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: false
    cmd_vel_timeout: 0.5   # slam_toolbox_params.yaml の中を修正
